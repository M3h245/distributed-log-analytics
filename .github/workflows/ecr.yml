name: Build and Push to ECR

on:
  push:
    branches: ['main']
  workflow_dispatch:
    inputs:
      az_to_fail:
        description: "Availability Zone to simulate failure (e.g., eu-south-1a). Leave blank to auto-pick."
        required: false
        default: ""

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-south-1' }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME || 'distributed-log-analytics' }}
      CLUSTER_NAME: ${{ vars.CLUSTER_NAME || format('{0}-cluster', vars.PROJECT_NAME || 'distributed-log-analytics') }}
      IMAGE_TAG: latest
    strategy:
      matrix:
        include:
          - name: api
            context: api-service
            dockerfile: api-service/Dockerfile
          - name: producer
            context: producer-service
            dockerfile: producer-service/Dockerfile
          - name: processor
            context: processor-service
            dockerfile: processor-service/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Copy .env
        run: cp .env ${{ matrix.context }}/.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ matrix.name }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ matrix.name }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-push
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-south-1' }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME || 'distributed-log-analytics' }}
      CLUSTER_NAME: ${{ vars.CLUSTER_NAME || format('{0}-cluster', vars.PROJECT_NAME || 'distributed-log-analytics') }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECS cluster exists
        run: |
          CLUSTER="${CLUSTER_NAME}"

          if aws ecs describe-clusters \
            --clusters "$CLUSTER" \
            --region "$AWS_REGION" \
            --query "clusters[0].status" \
            --output text 2>/dev/null | grep -q ACTIVE; then
            echo "Cluster exists"
          else
            echo "Creating cluster $CLUSTER"
            aws ecs create-cluster --cluster-name "$CLUSTER" --region "$AWS_REGION"
            aws ecs describe-clusters --clusters "$CLUSTER" --region "$AWS_REGION" --query "clusters[0].status" --output text
          fi

      - name: Force new deployments
        run: |
          CLUSTER="${CLUSTER_NAME}"
          aws ecs update-service --region "$AWS_REGION" --cluster "$CLUSTER" --service "${PROJECT_NAME}-api" --force-new-deployment
          aws ecs update-service --region "$AWS_REGION" --cluster "$CLUSTER" --service "${PROJECT_NAME}-producer" --force-new-deployment
          aws ecs update-service --region "$AWS_REGION" --cluster "$CLUSTER" --service "${PROJECT_NAME}-processor" --force-new-deployment

      - name: Wait for services
        run: |
          CLUSTER="${CLUSTER_NAME}"
          aws ecs wait services-stable --region "$AWS_REGION" --cluster "$CLUSTER" \
            --services "${PROJECT_NAME}-api" "${PROJECT_NAME}-producer" "${PROJECT_NAME}-processor"

  az-failover-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: deploy
    permissions:
      contents: read
    if: ${{ github.event_name == 'workflow_dispatch' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-south-1' }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME || 'distributed-log-analytics' }}
      CLUSTER_NAME: ${{ vars.CLUSTER_NAME || format('{0}-cluster', vars.PROJECT_NAME || 'distributed-log-analytics') }}
      AZ_TO_FAIL: ${{ inputs.az_to_fail }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Simulate AZ Failure (Stop Tasks In One AZ)
        shell: bash
        run: |
          set -euo pipefail
          CLUSTER="${CLUSTER_NAME}"
          SERVICES=("${PROJECT_NAME}-api" "${PROJECT_NAME}-producer" "${PROJECT_NAME}-processor")

          if [[ -z "${AZ_TO_FAIL}" ]]; then
            # Pick AZ from first API task if not provided
            API_TASK=$(aws ecs list-tasks --region "$AWS_REGION" --cluster "$CLUSTER" \
              --service-name "${PROJECT_NAME}-api" --desired-status RUNNING --query "taskArns[0]" --output text)
            AZ_TO_FAIL=$(aws ecs describe-tasks --region "$AWS_REGION" --cluster "$CLUSTER" \
              --tasks "$API_TASK" --query "tasks[0].availabilityZone" --output text)
          fi

          echo "Simulating AZ outage for: $AZ_TO_FAIL"

          for svc in "${SERVICES[@]}"; do
            TASKS=$(aws ecs list-tasks --region "$AWS_REGION" --cluster "$CLUSTER" \
              --service-name "$svc" --desired-status RUNNING --output text --query "taskArns")
            for task in $TASKS; do
              AZ=$(aws ecs describe-tasks --region "$AWS_REGION" --cluster "$CLUSTER" \
                --tasks "$task" --query "tasks[0].availabilityZone" --output text)
              if [[ "$AZ" == "$AZ_TO_FAIL" ]]; then
                echo "Stopping task $task in $AZ for service $svc"
                aws ecs stop-task --region "$AWS_REGION" --cluster "$CLUSTER" --task "$task" --reason "AZ failover test"
              fi
            done
          done

      - name: Verify Services Recover In Other AZ
        run: |
          CLUSTER="${CLUSTER_NAME}"
          aws ecs wait services-stable --region "$AWS_REGION" --cluster "$CLUSTER" \
            --services "${PROJECT_NAME}-api" "${PROJECT_NAME}-producer" "${PROJECT_NAME}-processor"

      - name: Report Post-Test Task Placement
        shell: bash
        run: |
          CLUSTER="${CLUSTER_NAME}"
          for svc in "${PROJECT_NAME}-api" "${PROJECT_NAME}-producer" "${PROJECT_NAME}-processor"; do
            echo "Service: $svc"
            TASKS=$(aws ecs list-tasks --region "$AWS_REGION" --cluster "$CLUSTER" \
              --service-name "$svc" --desired-status RUNNING --output text --query "taskArns")
            for task in $TASKS; do
              AZ=$(aws ecs describe-tasks --region "$AWS_REGION" --cluster "$CLUSTER" \
                --tasks "$task" --query "tasks[0].availabilityZone" --output text)
              echo "  $task -> $AZ"
            done
          done
