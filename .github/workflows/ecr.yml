name: Build and Push to ECR

on:
  push:
    branches: ['main']
  workflow_dispatch:
    inputs:
      az_to_fail:
        description: "Availability Zone to simulate failure (e.g., eu-south-1a). Leave blank to auto-pick."
        required: false
        default: ""

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-south-1' }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME || 'distributed-log-analytics' }}
      CLUSTER_NAME: ${{ vars.CLUSTER_NAME || format('{0}-cluster', vars.PROJECT_NAME || 'distributed-log-analytics') }}
      IMAGE_TAG: latest
    strategy:
      matrix:
        include:
          - name: api
            context: api-service
            dockerfile: api-service/Dockerfile
          - name: producer
            context: producer-service
            dockerfile: producer-service/Dockerfile
          - name: processor
            context: processor-service
            dockerfile: processor-service/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Copy .env
        run: cp .env ${{ matrix.context }}/.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ matrix.name }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ matrix.name }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-push
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-south-1' }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME || 'distributed-log-analytics' }}
      CLUSTER_NAME: ${{ vars.CLUSTER_NAME || format('{0}-cluster', vars.PROJECT_NAME || 'distributed-log-analytics') }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECS cluster exists
        run: |
          CLUSTER="${CLUSTER_NAME}"

          if aws ecs describe-clusters \
            --clusters "$CLUSTER" \
            --region "$AWS_REGION" \
            --query "clusters[0].status" \
            --output text 2>/dev/null | grep -q ACTIVE; then
            echo "Cluster exists"
          else
            echo "Creating cluster $CLUSTER"
            aws ecs create-cluster --cluster-name "$CLUSTER" --region "$AWS_REGION"
            aws ecs describe-clusters --clusters "$CLUSTER" --region "$AWS_REGION" --query "clusters[0].status" --output text
          fi

      - name: Force new deployments
        run: |
          CLUSTER="${CLUSTER_NAME}"
          aws ecs update-service --region "$AWS_REGION" --cluster "$CLUSTER" --service "${PROJECT_NAME}-api-a" --force-new-deployment
          aws ecs update-service --region "$AWS_REGION" --cluster "$CLUSTER" --service "${PROJECT_NAME}-api-b" --force-new-deployment
          aws ecs update-service --region "$AWS_REGION" --cluster "$CLUSTER" --service "${PROJECT_NAME}-producer-a" --force-new-deployment
          aws ecs update-service --region "$AWS_REGION" --cluster "$CLUSTER" --service "${PROJECT_NAME}-producer-b" --force-new-deployment
          aws ecs update-service --region "$AWS_REGION" --cluster "$CLUSTER" --service "${PROJECT_NAME}-processor-a" --force-new-deployment
          aws ecs update-service --region "$AWS_REGION" --cluster "$CLUSTER" --service "${PROJECT_NAME}-processor-b" --force-new-deployment

      - name: Wait for services
        run: |
          CLUSTER="${CLUSTER_NAME}"
          aws ecs wait services-stable --region "$AWS_REGION" --cluster "$CLUSTER" \
            --services "${PROJECT_NAME}-api-a" "${PROJECT_NAME}-api-b" "${PROJECT_NAME}-producer-a" "${PROJECT_NAME}-producer-b" "${PROJECT_NAME}-processor-a" "${PROJECT_NAME}-processor-b"

  az-failover-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: deploy
    permissions:
      contents: read

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-south-1' }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME || 'distributed-log-analytics' }}
      CLUSTER_NAME: ${{ vars.CLUSTER_NAME || format('{0}-cluster', vars.PROJECT_NAME || 'distributed-log-analytics') }}
      AZ_TO_FAIL: ${{ github.event.inputs.az_to_fail || '' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate ECR Images Exist
        shell: bash
        run: |
          set -euo pipefail
          for name in api producer processor; do
            repo="${PROJECT_NAME}-${name}"
            if ! aws ecr describe-images --region "$AWS_REGION" --repository-name "$repo" \
              --image-ids imageTag=latest >/dev/null 2>&1; then
              echo "Missing image tag 'latest' in ECR repo: $repo"
              exit 1
            fi
          done

      - name: Simulate AZ Failure (Restrict Subnets To One AZ)
        shell: bash
        run: |
          set -euo pipefail
          CLUSTER="${CLUSTER_NAME}"
          SERVICES=("${PROJECT_NAME}-api-a" "${PROJECT_NAME}-api-b" "${PROJECT_NAME}-producer-a" "${PROJECT_NAME}-producer-b" "${PROJECT_NAME}-processor-a" "${PROJECT_NAME}-processor-b")

          # Get current subnets and security group from API service
          API_SUBNETS=$(aws ecs describe-services --region "$AWS_REGION" --cluster "$CLUSTER" \
            --services "${PROJECT_NAME}-api" --query "services[0].networkConfiguration.awsvpcConfiguration.subnets" --output text)
          API_SG=$(aws ecs describe-services --region "$AWS_REGION" --cluster "$CLUSTER" \
            --services "${PROJECT_NAME}-api" --query "services[0].networkConfiguration.awsvpcConfiguration.securityGroups[0]" --output text)

          # Build full subnet list from VPC (in case service is already restricted)
          FIRST_SUBNET=$(printf "%s" "$API_SUBNETS" | awk '{print $1}')
          VPC_ID=$(aws ec2 describe-subnets --region "$AWS_REGION" --subnet-ids "$FIRST_SUBNET" --query "Subnets[0].VpcId" --output text)
          ALL_PUBLIC_SUBNETS=$(aws ec2 describe-subnets --region "$AWS_REGION" \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=map-public-ip-on-launch,Values=true" \
            --query "Subnets[].SubnetId" --output text)
          if [[ -n "$ALL_PUBLIC_SUBNETS" ]]; then
            API_SUBNETS="$ALL_PUBLIC_SUBNETS"
          fi

          # Map subnets to AZs
          declare -A SUBNET_TO_AZ
          for subnet in $API_SUBNETS; do
            az=$(aws ec2 describe-subnets --region "$AWS_REGION" --subnet-ids "$subnet" --query "Subnets[0].AvailabilityZone" --output text)
            SUBNET_TO_AZ["$subnet"]="$az"
          done

          # Pick AZ to fail
          if [[ -z "${AZ_TO_FAIL}" ]]; then
            AZ_TO_FAIL=$(printf "%s\n" "${SUBNET_TO_AZ[@]}" | sort | uniq | head -n 1)
          fi
          echo "Simulating AZ outage for: $AZ_TO_FAIL"

          # Build subnet lists
          SUBNETS_FAIL=""
          SUBNETS_OK=""
          for subnet in $API_SUBNETS; do
            if [[ "${SUBNET_TO_AZ[$subnet]}" == "$AZ_TO_FAIL" ]]; then
              SUBNETS_FAIL+="$subnet "
            else
              SUBNETS_OK+="$subnet "
            fi
          done
          if [[ -z "$SUBNETS_OK" ]]; then
            echo "No remaining subnets found outside $AZ_TO_FAIL"
            exit 1
          fi
          AZ_TO_KEEP=$(printf "%s\n" "${SUBNET_TO_AZ[@]}" | sort | uniq | grep -v "$AZ_TO_FAIL" | head -n 1)
          if [[ -z "$AZ_TO_KEEP" ]]; then
            echo "Could not determine AZ to keep"
            exit 1
          fi

          # Message mapping: if AZ 1a is down -> send test 2 first, else test 1 first
          MSG1="test 1"
          MSG2="test 2"
          if [[ "$AZ_TO_FAIL" == *"1a" ]]; then
            MSG1="test 2"
            MSG2="test 1"
          fi

          # Export for later steps
          {
            echo "API_SUBNETS=$API_SUBNETS"
            echo "API_SG=$API_SG"
            echo "AZ_TO_FAIL=$AZ_TO_FAIL"
            echo "AZ_TO_KEEP=$AZ_TO_KEEP"
            echo "SUBNETS_OK=$SUBNETS_OK"
            echo "SUBNETS_FAIL=$SUBNETS_FAIL"
            echo "MSG1=$MSG1"
            echo "MSG2=$MSG2"
          } >> "$GITHUB_ENV"

          update_service_subnets () {
            local svc="$1"
            local subnets_csv
            subnets_csv=$(printf "%s" "$2" | tr -s '[:space:]' ',' | sed 's/^,*//; s/,*$//')
            aws ecs update-service --region "$AWS_REGION" --cluster "$CLUSTER" --service "$svc" \
              --network-configuration "awsvpcConfiguration={subnets=[$subnets_csv],securityGroups=[$API_SG],assignPublicIp=ENABLED}"
          }

          echo "Restricting services to AZs outside $AZ_TO_FAIL"
          for svc in "${SERVICES[@]}"; do
            update_service_subnets "$svc" "$SUBNETS_OK"
          done
      
      - name: Send Test Message (After AZ Fail)
        shell: bash
        run: |
          set -euo pipefail
          ALB_DNS=$(aws elbv2 describe-load-balancers --region "$AWS_REGION" \
            --names "${PROJECT_NAME}-alb" --query "LoadBalancers[0].DNSName" --output text)
          if [[ -z "$ALB_DNS" || "$ALB_DNS" == "None" ]]; then
            echo "ALB DNS not found"
            exit 1
          fi
          curl -sG --data-urlencode "message=${MSG1}" "http://${ALB_DNS}/demo-send" >/tmp/send1.json
          echo "Sent message: ${MSG1}"

      - name: Verify Services Recover In Other AZ
        shell: bash
        run: |
          set -euo pipefail
          CLUSTER="${CLUSTER_NAME}"
          SERVICES=("${PROJECT_NAME}-api-a" "${PROJECT_NAME}-api-b" "${PROJECT_NAME}-producer-a" "${PROJECT_NAME}-producer-b" "${PROJECT_NAME}-processor-a" "${PROJECT_NAME}-processor-b")

          for svc in "${SERVICES[@]}"; do
            echo "Waiting for $svc to stabilize..."
            ok="false"
            for i in {1..30}; do
              desired=$(aws ecs describe-services --region "$AWS_REGION" --cluster "$CLUSTER" \
                --services "$svc" --query "services[0].desiredCount" --output text)
              running=$(aws ecs describe-services --region "$AWS_REGION" --cluster "$CLUSTER" \
                --services "$svc" --query "services[0].runningCount" --output text)
              if [[ "$desired" != "0" && "$running" -ge "$desired" ]]; then
                ok="true"
                break
              fi
              sleep 10
            done
            if [[ "$ok" != "true" ]]; then
              echo "Service $svc did not stabilize."
              aws ecs describe-services --region "$AWS_REGION" --cluster "$CLUSTER" \
                --services "$svc" --query "services[0].events[0:5]" --output json
              exit 1
            fi
          done

      
      - name: Flip AZ (Fail The Other One)
        shell: bash
        run: |
          set -euo pipefail
          CLUSTER="${CLUSTER_NAME}"
          SERVICES=("${PROJECT_NAME}-api-a" "${PROJECT_NAME}-api-b" "${PROJECT_NAME}-producer-a" "${PROJECT_NAME}-producer-b" "${PROJECT_NAME}-processor-a" "${PROJECT_NAME}-processor-b")

          update_service_subnets () {
            local svc="$1"
            local subnets_csv
            subnets_csv=$(printf "%s" "$2" | tr -s '[:space:]' ',' | sed 's/^,*//; s/,*$//')
            aws ecs update-service --region "$AWS_REGION" --cluster "$CLUSTER" --service "$svc" \
              --network-configuration "awsvpcConfiguration={subnets=[$subnets_csv],securityGroups=[$API_SG],assignPublicIp=ENABLED}"
          }

          echo "Restricting services to AZ: $AZ_TO_FAIL"
          for svc in "${SERVICES[@]}"; do
            update_service_subnets "$svc" "$SUBNETS_FAIL"
          done
          
      - name: Send Test Message (After Second AZ Fail)
        shell: bash
        run: |
           set -euo pipefail
           ALB_DNS=$(aws elbv2 describe-load-balancers --region "$AWS_REGION" \
             --names "${PROJECT_NAME}-alb" --query "LoadBalancers[0].DNSName" --output text)
           if [[ -z "$ALB_DNS" || "$ALB_DNS" == "None" ]]; then
            echo "ALB DNS not found"
             exit 1
           fi
           curl -sG --data-urlencode "message=${MSG2}" "http://${ALB_DNS}/demo-send" >/tmp/send2.json
           echo "Sent message: ${MSG2}"
                
      - name: Verify Services Recover In Other AZ (Second Flip)
        shell: bash
        run: |
          set -euo pipefail
          CLUSTER="${CLUSTER_NAME}"
          SERVICES=("${PROJECT_NAME}-api-a" "${PROJECT_NAME}-api-b" "${PROJECT_NAME}-producer-a" "${PROJECT_NAME}-producer-b" "${PROJECT_NAME}-processor-a" "${PROJECT_NAME}-processor-b")

          for svc in "${SERVICES[@]}"; do
            echo "Waiting for $svc to stabilize..."
            ok="false"
            for i in {1..30}; do
              desired=$(aws ecs describe-services --region "$AWS_REGION" --cluster "$CLUSTER" \
                --services "$svc" --query "services[0].desiredCount" --output text)
              running=$(aws ecs describe-services --region "$AWS_REGION" --cluster "$CLUSTER" \
                --services "$svc" --query "services[0].runningCount" --output text)
              if [[ "$desired" != "0" && "$running" -ge "$desired" ]]; then
                ok="true"
                break
              fi
              sleep 10
            done
            if [[ "$ok" != "true" ]]; then
              echo "Service $svc did not stabilize."
              aws ecs describe-services --region "$AWS_REGION" --cluster "$CLUSTER" \
                --services "$svc" --query "services[0].events[0:5]" --output json
              exit 1
            fi
          done

      

      - name: Restore Both AZs
        shell: bash
        run: |
          set -euo pipefail
          CLUSTER="${CLUSTER_NAME}"
          SERVICES=("${PROJECT_NAME}-api-a" "${PROJECT_NAME}-api-b" "${PROJECT_NAME}-producer-a" "${PROJECT_NAME}-producer-b" "${PROJECT_NAME}-processor-a" "${PROJECT_NAME}-processor-b")

          update_service_subnets () {
            local svc="$1"
            local subnets_csv
            subnets_csv=$(printf "%s" "$2" | tr -s '[:space:]' ',' | sed 's/^,*//; s/,*$//')
            aws ecs update-service --region "$AWS_REGION" --cluster "$CLUSTER" --service "$svc" \
              --network-configuration "awsvpcConfiguration={subnets=[$subnets_csv],securityGroups=[$API_SG],assignPublicIp=ENABLED}"
          }

          echo "Restoring services to both AZ subnets"
          for svc in "${SERVICES[@]}"; do
            update_service_subnets "$svc" "$API_SUBNETS"
          done

      - name: Verify Services Stable (Restored)
        shell: bash
        run: |
          set -euo pipefail
          CLUSTER="${CLUSTER_NAME}"
          SERVICES=("${PROJECT_NAME}-api" "${PROJECT_NAME}-producer" "${PROJECT_NAME}-processor")

          for svc in "${SERVICES[@]}"; do
            echo "Waiting for $svc to stabilize..."
            ok="false"
            for i in {1..30}; do
              desired=$(aws ecs describe-services --region "$AWS_REGION" --cluster "$CLUSTER" \
                --services "$svc" --query "services[0].desiredCount" --output text)
              running=$(aws ecs describe-services --region "$AWS_REGION" --cluster "$CLUSTER" \
                --services "$svc" --query "services[0].runningCount" --output text)
              if [[ "$desired" != "0" && "$running" -ge "$desired" ]]; then
                ok="true"
                break
              fi
              sleep 10
            done
            if [[ "$ok" != "true" ]]; then
              echo "Service $svc did not stabilize."
              aws ecs describe-services --region "$AWS_REGION" --cluster "$CLUSTER" \
                --services "$svc" --query "services[0].events[0:5]" --output json
              exit 1
            fi
          done

      - name: Verify Logs Contain Both Messages
        shell: bash
        run: |
          set -euo pipefail
          ALB_DNS=$(aws elbv2 describe-load-balancers --region "$AWS_REGION" \
            --names "${PROJECT_NAME}-alb" --query "LoadBalancers[0].DNSName" --output text)

          for i in {1..10}; do
            DATA=$(curl -s "http://${ALB_DNS}/logs?limit=200")
            echo "$DATA" | grep -q "test 1" && echo "$DATA" | grep -q "test 2" && exit 0
            sleep 3
          done
          echo "Did not find both test messages in logs"
          exit 1

      - name: Report Post-Test Task Placement
        shell: bash
        run: |
          CLUSTER="${CLUSTER_NAME}"
          for svc in "${PROJECT_NAME}-api" "${PROJECT_NAME}-producer" "${PROJECT_NAME}-processor"; do
            echo "Service: $svc"
            TASKS=$(aws ecs list-tasks --region "$AWS_REGION" --cluster "$CLUSTER" \
              --service-name "$svc" --desired-status RUNNING --output text --query "taskArns")
            for task in $TASKS; do
              AZ=$(aws ecs describe-tasks --region "$AWS_REGION" --cluster "$CLUSTER" \
                --tasks "$task" --query "tasks[0].availabilityZone" --output text)
              echo "  $task -> $AZ"
            done
          done
